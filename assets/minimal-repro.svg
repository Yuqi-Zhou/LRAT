<svg width="1460" height="372" viewBox="0 0 1460 372" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1460" height="372" rx="28" fill="#FFFDF8"/>
  <rect x="24" y="24" width="1412" height="324" rx="24" fill="#FFFBEB" stroke="#F3E8C7" stroke-width="2"/>

  <text x="60" y="72" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">
    Minimal Reproduction Path
  </text>
  <text x="60" y="104" fill="#4B5563" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Install the repo, build one index, run a few queries, convert trajectories, and verify evaluation outputs.
  </text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="60" y="144" width="220" height="132" rx="20" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
    <text x="88" y="182" fill="#1E3A8A" font-size="22" font-weight="700">1. Environment</text>
    <text x="88" y="212" fill="#1D4ED8" font-size="17">uv sync + activate</text>
    <text x="88" y="238" fill="#1D4ED8" font-size="17">install FlagEmbedding</text>

    <rect x="324" y="144" width="220" height="132" rx="20" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
    <text x="352" y="182" fill="#14532D" font-size="22" font-weight="700">2. Build Index</text>
    <text x="352" y="212" fill="#166534" font-size="17">bm25 or dense</text>
    <text x="352" y="236" fill="#166534" font-size="17">encode once</text>
    <text x="352" y="260" fill="#166534" font-size="17">src/index_builder.py</text>

    <rect x="588" y="144" width="220" height="132" rx="20" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2"/>
    <text x="616" y="182" fill="#92400E" font-size="22" font-weight="700">3. Run Queries</text>
    <text x="616" y="212" fill="#B45309" font-size="17">save trajectory JSON</text>
    <text x="616" y="238" fill="#B45309" font-size="17">search_agent/*.py</text>

    <rect x="852" y="144" width="220" height="132" rx="20" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2"/>
    <text x="880" y="182" fill="#9D174D" font-size="22" font-weight="700">4. Training Data</text>
    <text x="880" y="212" fill="#BE185D" font-size="17">judge browse</text>
    <text x="880" y="236" fill="#BE185D" font-size="17">relevance</text>
    <text x="880" y="260" fill="#BE185D" font-size="17">src/data_builder.py</text>

    <rect x="1116" y="144" width="280" height="132" rx="20" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="2"/>
    <text x="1144" y="182" fill="#5B21B6" font-size="22" font-weight="700">5. Evaluate Outputs</text>
    <text x="1144" y="212" fill="#6D28D9" font-size="17">saved runs + ground truth</text>
    <text x="1144" y="238" fill="#6D28D9" font-size="17">scripts_evaluation/</text>
    <text x="1144" y="262" fill="#6D28D9" font-size="17">evaluate.py</text>
  </g>

  <path d="M281 210H314" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M545 210H578" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M809 210H842" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M1073 210H1106" stroke="#111827" stroke-width="4" stroke-linecap="round"/>

  <path d="M302 198L318 210L302 222" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M566 198L582 210L566 222" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M830 198L846 210L830 222" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1094 198L1110 210L1094 222" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
